name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build core (others depend on its .d.ts)
        run: npm run build -w packages/core
      - name: Build remaining packages
        run: npm run build -w packages/vitest -w packages/cli -w packages/promptfoo -w packages/mcp-server
      - name: Typecheck
        run: npm run typecheck
      - name: Lint (autofix + check)
        run: npx biome check --fix --unsafe . && npm run lint
      - name: Test
        run: npm run test
