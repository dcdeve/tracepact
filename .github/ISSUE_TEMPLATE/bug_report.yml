name: Bug Report
description: Report a bug in TracePact
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      render: typescript

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@tracepact/core"
        - "@tracepact/vitest"
        - "@tracepact/cli"
        - "@tracepact/promptfoo"
        - "@tracepact/mcp-server"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.4.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.x"

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
