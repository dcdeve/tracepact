name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include API examples if possible.
      render: typescript

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@tracepact/core"
        - "@tracepact/vitest"
        - "@tracepact/cli"
        - "@tracepact/promptfoo"
        - "@tracepact/mcp-server"
        - New package

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered?
