description: "Doc writer — TracePact integration"

providers:
  - id: "file://./tracepact-provider.js"
    config:
      skill: "./SKILL.md"
      provider: openai
      model: gpt-4o
      tools:
        read_file:
          type: readFile
          files:
            "src/utils.ts": |
              /**
               * Clamps a number between min and max.
               */
              export function clamp(value: number, min: number, max: number): number {
                return Math.min(Math.max(value, min), max);
              }

              /**
               * Retries an async function up to `times` attempts.
               */
              export async function retry<T>(fn: () => Promise<T>, times: number): Promise<T> {
                let lastError: Error | undefined;
                for (let i = 0; i < times; i++) {
                  try { return await fn(); }
                  catch (e) { lastError = e as Error; }
                }
                throw lastError;
              }
        write_file:
          type: writeFile

prompts:
  - "Generate documentation for {{file}}"

tests:
  - vars:
      file: "src/utils.ts"
    assert:
      # Agent should read the source first
      - type: javascript
        value: |
          const { assertCalledTool } = require("@tracepact/promptfoo");
          return assertCalledTool(output, context, "read_file");

      # Agent should write the docs file
      - type: javascript
        value: |
          const { assertCalledTool } = require("@tracepact/promptfoo");
          return assertCalledTool(output, context, "write_file");

      # Should read before writing
      - type: javascript
        value: |
          const { assertCalledToolsInOrder } = require("@tracepact/promptfoo");
          return assertCalledToolsInOrder(output, context, ["read_file", "write_file"]);

      # Output should mention the functions
      - type: javascript
        value: |
          const { assertOutputMentions } = require("@tracepact/promptfoo");
          return assertOutputMentions(output, context, "clamp");
